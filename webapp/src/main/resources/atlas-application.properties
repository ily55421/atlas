#########  Atlas Server Configs #########
atlas.rest.address=http://localhost:21000

#########  Graph Database Configs  #########

# Graph database implementation
atlas.graphdb.backend=org.apache.atlas.repository.graphdb.janus.AtlasJanusGraphDatabase

# Graph Storage - use berkeleyje for embedded mode
atlas.graph.storage.backend=berkeleyje
atlas.graph.storage.directory=${sys:atlas.data}/berkeley
atlas.graph.storage.transactions=true

# Graph Search Index - use lucene for embedded mode (no external dependencies)
atlas.graph.index.search.backend=lucene
atlas.graph.index.search.directory=${sys:atlas.data}/lucene
atlas.graph.index.search.max-result-set-size=150

# Disable Elasticsearch completely
atlas.graph.index.search.elasticsearch.client-only=false
atlas.graph.index.search.elasticsearch.local-mode=false

# Entity repository implementation - in-memory for dev
atlas.EntityAuditRepository.impl=org.apache.atlas.repository.audit.InMemoryEntityAuditRepository

#########  Notification Configs  #########
atlas.notification.embedded=true
atlas.notification.entity.version=v1

atlas.kafka.zookeeper.connect=192.168.0.74:19026
atlas.kafka.bootstrap.servers=192.168.0.74:19027
atlas.kafka.data=${sys:atlas.data}/kafka
atlas.kafka.zookeeper.session.timeout.ms=4000
atlas.kafka.zookeeper.sync.time.ms=20
atlas.kafka.consumer.timeout.ms=4000
atlas.kafka.auto.commit.interval.ms=100
atlas.kafka.hook.group.id=atlas
atlas.kafka.entities.group.id=atlas_entities
atlas.kafka.enable.auto.commit=false
atlas.kafka.auto.offset.reset=earliest
atlas.kafka.session.timeout.ms=30000
atlas.kafka.offsets.topic.replication.factor=1

#########  Security Properties  #########
atlas.enableTLS=false
atlas.server.https.port=21443
hbase.security.authentication=simple

#########  JAAS Configuration ########
atlas.jaas.KafkaClient.loginModuleName=com.sun.security.auth.module.Krb5LoginModule
atlas.jaas.KafkaClient.loginModuleControlFlag=required

#########  High Availability Configuration ########
atlas.server.ha.enabled=false

######### Atlas Authorization #########
atlas.authorizer.impl=none

######### Atlas Authentication #########
atlas.authentication.method.file=true
atlas.authentication.method.ldap.type=none
atlas.authentication.method.kerberos=false

#########  Gremlin Search Configuration  #########
atlas.search.gremlin.enable=true

#########  Configure use of Tasks  #########
atlas.tasks.enabled=false
atlas.debug.metrics.enabled=true

#########  Configure on-demand lineage  #########
atlas.lineage.on.demand.enabled=true
