# Apache Atlas Spring Boot Configuration

server:
  port: 21000
  servlet:
    context-path: /
    session:
      timeout: 60m
      cookie:
        name: ATLASSESSIONID
        http-only: true
        # Disable default Spring Boot error page to use our custom error.jsp
  error:
    path: /error.jsp
    whitelabel:
      enabled: false
spring:
  application:
    name: atlas-server
  session:
    store-type: none
  mvc:
    static-path-pattern: /**
  security:
    user:
      name: admin
      password: admin
  web:
    resources:
      static-locations: classpath:/META-INF/resources/
  main:
    allow-bean-definition-overriding: true

# Atlas specific configurations can be set here or in atlas-application.properties
atlas:
  server:
    http:
      port: 21000
    https:
      port: 21443
